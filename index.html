<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML to Markdown</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: #dee2e6;
      --text: #212529;
      --muted: #6c757d;
      --accent: #0d6efd;
      --accent-hover: #0b5ed7;
      --danger: #dc3545;
      --radius: 8px;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
      gap: 1rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      margin: 0.25rem 0 0;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      flex: 1;
      min-height: 0;
    }

    @media (max-width: 768px) {
      .panels {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
    }

    .panel {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 0;
    }

    .panel-header {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.875rem;
    }

    .panel-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0.75rem;
      gap: 0.75rem;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 200px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 0;
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    button {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--bg);
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin: -0.75rem -0.75rem 0;
      padding: 0 0.75rem;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      padding: 0.65rem 1rem;
      color: var(--muted);
      margin-bottom: -1px;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0;
      gap: 0.75rem;
    }

    .tab-panel.active {
      display: flex;
    }

    .preview {
      flex: 1;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      font-size: 14px;
      line-height: 1.6;
      min-height: 200px;
    }

    .preview h1, .preview h2, .preview h3 { margin-top: 1em; }
    .preview pre {
      background: var(--bg);
      padding: 0.75rem;
      border-radius: var(--radius);
      overflow-x: auto;
    }

    .preview code {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 0.9em;
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.875rem;
      padding: 0.5rem 0;
    }

    .error-msg:empty { display: none; }

    .placeholder {
      color: var(--muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>HTML to Markdown</h1>
      <p>Paste raw email HTML and convert it to clean Markdown.</p>
    </header>

    <div class="panels">
      <section class="panel">
        <div class="panel-header">HTML input</div>
        <div class="panel-body">
          <textarea id="html-input" placeholder="Paste HTML here…" spellcheck="false"></textarea>
          <div class="actions">
            <button type="button" class="btn-primary" id="convert-btn">Convert</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="tabs" role="tablist">
          <button type="button" class="tab active" data-tab="preview" role="tab" aria-selected="true">Preview</button>
          <button type="button" class="tab" data-tab="raw" role="tab" aria-selected="false">Raw</button>
        </div>
        <div class="panel-body">
          <p class="error-msg" id="error-msg" role="alert"></p>

          <div class="tab-panel active" id="tab-preview" role="tabpanel">
            <div class="preview placeholder" id="preview-content">Converted Markdown will appear here.</div>
          </div>

          <div class="tab-panel" id="tab-raw" role="tabpanel">
            <textarea id="raw-output" readonly placeholder="Markdown output…" spellcheck="false"></textarea>
            <div class="actions">
              <button type="button" class="btn-secondary" id="copy-btn" disabled>Copy</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const htmlInput = document.getElementById('html-input');
    const convertBtn = document.getElementById('convert-btn');
    const previewContent = document.getElementById('preview-content');
    const rawOutput = document.getElementById('raw-output');
    const copyBtn = document.getElementById('copy-btn');
    const errorMsg = document.getElementById('error-msg');
    const tabs = document.querySelectorAll('.tab');
    const tabPanels = {
      preview: document.getElementById('tab-preview'),
      raw: document.getElementById('tab-raw'),
    };

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach((t) => {
          t.classList.toggle('active', t === tab);
          t.setAttribute('aria-selected', t === tab ? 'true' : 'false');
        });
        Object.entries(tabPanels).forEach(([name, panel]) => {
          panel.classList.toggle('active', name === tab.dataset.tab);
        });
      });
    });

    function setError(message) {
      errorMsg.textContent = message || '';
    }

    function setOutput(markdown) {
      rawOutput.value = markdown;
      copyBtn.disabled = !markdown;

      previewContent.classList.remove('placeholder');
      if (typeof marked !== 'undefined' && marked.parse) {
        previewContent.innerHTML = marked.parse(markdown);
      } else {
        previewContent.textContent = markdown;
      }
    }

    function clearOutput() {
      rawOutput.value = '';
      copyBtn.disabled = true;
      previewContent.classList.add('placeholder');
      previewContent.textContent = 'Converted Markdown will appear here.';
    }

    async function convert() {
      const html = htmlInput.value;
      setError('');
      convertBtn.disabled = true;
      convertBtn.textContent = 'Converting…';

      try {
        const response = await fetch('/convert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ html }),
        });

        const data = await response.json();

        if (!response.ok) {
          clearOutput();
          setError(data.error || 'Conversion failed.');
          return;
        }

        setOutput(data.markdown);
      } catch (err) {
        clearOutput();
        setError(err.message || 'Network error. Is the worker running?');
      } finally {
        convertBtn.disabled = false;
        convertBtn.textContent = 'Convert';
      }
    }

    convertBtn.addEventListener('click', convert);

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(rawOutput.value);
        const original = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = original; }, 1500);
      } catch {
        setError('Could not copy to clipboard.');
      }
    });
  </script>
</body>
</html>
